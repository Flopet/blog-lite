services:
  caddy:
    image: caddy:2-alpine
    container_name: blog-lite
    restart: unless-stopped
    ports:
      - "3939:80"
    volumes:
      - ${APPDATA_PATH}Caddyfile:/etc/caddy/Caddyfile:ro
      - ${APPDATA_PATH}site:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 2s
      timeout: 5s
      retries: 3
      start_period: 3s

volumes:
  caddy_data:
  caddy_config:
